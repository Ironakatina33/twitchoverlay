<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Overlay Twitch</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="overlay-page">
    <main id="overlayRoot" class="overlay-root anchor-top-left">
      <section data-widget="viewers" class="widget glass enter-up">
        <p class="widget-label">Viewers</p>
        <p id="viewerCount" class="widget-value">0</p>
      </section>

      <section data-widget="followers" class="widget glass enter-up delay-1">
        <p class="widget-label">Followers</p>
        <p id="followCount" class="widget-value">0</p>
      </section>

      <section data-widget="lastFollow" class="widget glass enter-up delay-2">
        <p class="widget-label">Dernier follow</p>
        <p id="lastFollow" class="widget-value truncate">-</p>
      </section>
    </main>

    <aside id="followAlert" class="follow-alert hidden" aria-live="polite">
      <span class="pulse-dot"></span>
      <div>
        <p class="alert-title">Nouveau Follow</p>
        <p id="alertUsername" class="alert-username">Nouveau follower</p>
      </div>
    </aside>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/overlay.js"></script>
  </body>
</html>
